<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>1 - Sistema de Avaliação de Atendimento: Dê Sua Nota! </h1>

    <label>Nota do Atendimento <input type="text" id="id_nota" placeholder="Digite o valor"></label>

    <button onclick="avaliar()">Avaliar Atendimento</button>

    <p id="resultado"></p>
</body>

</html>

<script>
    function avaliar() {
        let nota = Number(id_nota.value);

        if (nota < 0 || nota > 10) {
            resultado.innerHTML = "Nota inválida";

        } else if (nota >= 0 && nota < 5) {
            resultado.innerHTML = "Não aprovado";

        } else if (nota >= 5 && nota <= 6) {
            resultado.innerHTML = "Neutro";

        } else {
            resultado.innerHTML = "Aprovado";
        }
    }
</script>
