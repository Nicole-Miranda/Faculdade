<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Está Agradável ou Desconfortável?</h1>
    <br><br>
    <label>Informe a Temperatura </label>
    <input type="text" id="ipt_temp">
    <br><br>
    <label>Informe a Umidade do Ar</label>
    <input type="text" id="ipt_umidade">
    <br><br>
    <button onclick="Avaliando()">Avaliar Clima</button>
    <div id="mensagem"></div>
</body>
<script>
    function Avaliando(){
        let temperatura = Number(ipt_temp.value)
        let umidade = Number(ipt_umidade.value)

        mensagem.innerHTML="" 
        
        if(umidade<0 || umidade>100){
        
            alert("Valor de Umidade inválido")

        }else if (temperatura>=22 && temperatura<=23 && umidade<60){
            mensagem.innerHTML="Clima agradável"
        }else{
            mensagem.innerHTML="Clima desconfortável"
        }
    }
</script>
</html>
