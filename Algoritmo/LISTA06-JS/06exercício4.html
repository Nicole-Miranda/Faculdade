<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Acesso ao Banco Melete</h1>
    <label>Login</label>
    <input type="text" id="ipt_login">
    <br><br>
    <label>Senha</label>
    <input type="password" id="ipt_senha">
    <br><br>
    <label>Informação Pessoal</label>
    <input type="text" id="ipt_pessoal" placeholder="Ano de Nascimento ou Animal Favorito">
    <br><br>
    <button onclick="Autenticando()">Autenticar</button>
    <div id="mensagem"></div>
</body>
<script>
    function Autenticando(){
        let login = ipt_login.value
        let senha = ipt_senha.value
        let infoPessoal = ipt_pessoal.value

        if(login=="ana" && senha=="braga" && infoPessoal=="1949"||infoPessoal=="louro josé"){
           
            mensagem.innerHTML="Usuário Autenticado"

        } else{
           
            mensagem.innerHTML=="Falha na autenticação"
        }
    }
</script>
</html>
