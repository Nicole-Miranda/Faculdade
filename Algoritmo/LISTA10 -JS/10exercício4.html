<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="sortear()">Sortear nota para aluno</button>
    <br><br>
    <div id="resultado"></div>
</body>
</html>

<script>
    function sortear(){
        let nota = Math.random() * (10 - 0 + 1) + 0
        resultado.innerHTML = `<p>${nota.toFixed(1)}<p>`
    }
</script>
