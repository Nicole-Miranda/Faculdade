<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aleatórios</title>
</head>
<body>
    <button onclick="sortear()">Sortear</button>
    <div id="resultado"></div>
</body>
<script>
    function sortear(){
        let aleatorio = Math.random();

        if(aleatorio > 0.5){
            resultado.innerHTML+=`${aleatorio}<br>`
            resultado.innerHTML+=`Eu arredondaria pra 1`
        }else{
            resultado.innerHTML+=`Eu arredondaria para 0`
        }

    }
</script>
</html>
