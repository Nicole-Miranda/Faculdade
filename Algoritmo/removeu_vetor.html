<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <script>
        let nomes = ["Bob", "Tom", "Mel", "Ana", "Don"]

        console.log(`Nomes das listas após remover ${nomes}`)

        //splice(indice, quantidade)
        nomes.splice(2,2);
        console.log(`Nomes da lista após remover: ${nomes}`)
    </script>
</body>
