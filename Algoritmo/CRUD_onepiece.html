<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <label>Cadastrar Estoque de Comidas</label>
    <input type="text" id="ipt_comidas">
    <br><br>
    <button onclick="cadastrar()">Cadastrar</button>
    <br><br>
    <button onclick="verificar()">Verificar Quantidade</button>
    <br><br>
    <label>Nome Comida</label>
    <input type="text" id="ipt_nomecomida">
    <br><br>
    <button onclick="pesquisar()">Pesquisar</button>
    <br><br>
    <button onclick="estoque()">Exibir estoque</button>
    <br><br>
    <label>Nome Comida Atual</label>
    <input type="text" id="ipt_comidaAtual">
    <br><br>
    <label>Novo nome da comida</label>
    <input type="text" id="ipt_novocomida">
    <br><br>
    <button onclick="alterar()">Alterar nome</button>
    <br><br>
    <label>Nome da comida que deseja deletar</label>
    <input type="text" id="ipt_comidaDeletada">
    <br><br>
    <button onclick="remover()">Remover comida</button>
    <div id="resultado"></div>

</body>
<script>
    let Listacomidas = []

    function cadastrar() {
        let comida = ipt_comidas.value
        Listacomidas.push(comida)
        console.log(Listacomidas)
    }

    function verificar() {
        let tamanho = Listacomidas.length
        resultado.innerHTML = ""

        if (tamanho < 3) {
            resultado.innerHTML += 'Desse jeito, o Luffy devora até o navio'
        } else if (tamanho <= 7) {
            resultado.innerHTML += 'O comilão do Luffy não vai deixar sobrar nenhuma comida'
        } else if (tamanho <= 10) {
            resultado.innerHTML += 'Assim, talvez sobre um pouco para a tripulação'

        } else if (tamanho > 10) {
            resultado.innerHTML += 'Desse jeito vai ter comida para todo mundo e ainda consigo guardar um pouco para a senhorita Nami!'
        }
    }

    function pesquisar() {
        let Cadastro = ipt_nomecomida.value
        resultado.innerHTML = ""
        let contador = 0

        for (let i = 1; i < Listacomidas.length; i++) {
            if (Cadastro == Listacomidas[i]) {
                contador++
            }
        }
        if (Listacomidas.includes(Cadastro)) {

            resultado.innerHTML += `Temos a comida ${Cadastro} e há ${contador + 1} unidade(s) dela <br>`
        } else {

            resultado.innerHTML += `Alguém vai ter que comprar ${Cadastro}, tá fazendo falta...<br>`
        }
    }
    function estoque() {
        let comidaCadastrada = Listacomidas
        let alimento = ipt_comidas.value
        for (let i = 0; i < comidaCadastrada.length; i ++){
            let contar = 0 
            for (let j = 0; j < comidaCadastrada.length; j++) {
                if(comidaCadastrada[i] == comidaCadastrada[j]){
                    contar ++
                } 
                resultado.innerHTML+=`${comidaCadastrada[i]} (${contar})<br>`
            }
        }
    }
    function alterar() {
        let nomeAtual = ipt_comidaAtual.value
        let novoNome = ipt_novocomida.value
        if (nomeAtual == Listacomidas) {
            resultado.innerHTML = `A comida ${nomeAtual} foi alterada para ${novoNome}`
        } else {
            resultado.innerHTML = `A comida ${nomeAtual} não foi encontrada no estoque.`
        }
    }
    function remover() {

    }
</script>

</html>
