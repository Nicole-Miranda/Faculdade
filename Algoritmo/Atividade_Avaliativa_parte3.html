<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h1>Calculadora SPFlix</h1>

  <div>
      <p>Qualidade (720p ou 1080p ou 4K):</p>
      <input type="text" id="ipt_qualidade">
  </div>

  <div style="display: flex; gap: 50px">
    <div>
      <p>Telas simultâneas - Na mesma casa:</p>
      <input type="text" id="ipt_qtd_telas">
    </div>

    <div>
      <p>Telas extras - Fora da residência:</p>
      <input type="text" id="ipt_qtd_telas_extras">
    </div>
  </div>

  <div>
    <p>Quer fazer download ('sim' ou 'nao'):</p>
    <input type="text" id="ipt_download">
  </div>

  <p></p>
  <button onclick="exibirResultado()">Exibir Resultado</button>

  <p></p>
  <div id="div_mensagem"></div>

</body>
</html>
<script>
function exibirResultado() {
div_mensagem.innerHTML =""
let qualidade = ipt_qualidade.value

let valorBase = 0;
if(qualidade=='720p'){
  valorBase = 15.00
}else if (qualidade=="1080p"){
  valorBase = 20.00
  } else if(qualidade=='4k')
  valorBase = 25.00

  div_mensagem.innerHTML += `O valor base do seu plano é R$${valorBase}<br>` 


    div_mensagem.innerHTML = ""
   let telas = Number(ipt_qtd_telas.value)
let telasExtras = Number(ipt_qtd_telas_extras.value)
let preco = 0
let valorExtras = telasExtras *12.9
 if (telas <= 2) {
      preco = 10
  } else if (telas <= 4) {
      preco = 20
  } else {
      preco = 30
    }
      div_mensagem.innerHTML += `O valor das telas do seu plano é R$${preco + valorExtras}<br>` 

let valorfinal = valorBase + telasExtras * 12.90 + preco 

if(telas>0){   

  let divisão = valorfinal / telas + telasExtras
  div_mensagem.innerHTML += `Se quiser dividir fica R$${divisão.toFixed(2)} para cada! <br>`

 } 

}
</script>
