<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <label>Qual tabuada deseja? (2 a 9)</label>
    <input type="text" id="ipt_tabuada"> 
    <br><br>
    <label>Até que número? </label>
    <input type="text" id="ipt_numero"> <br><br>

    <button onclick="exibir()">Ver tabuada</button>

    <div id="resultado"></div>
</body>

</html>

<script>
    function exibir() {
        resultado.innerHTML = "<br>";

        let contador = 0;
        let tabuada = Number(ipt_tabuada.value)

        if (tabuada >= 2 && tabuada <= 9) {
            while (contador <= Number(ipt_numero.value)) {
                if (contador == 0) contador++;

                let cor = "red";

                if (contador % 2 == 0) cor = "blue";

                resultado.innerHTML += `<span style="color:${cor}"> ${tabuada} x ${contador} = ${tabuada * contador}</span> <br>`;
                contador++;
            }
        } else resultado.innerHTML = "<br><br>Digite apenas números de 2 a 9 para a tabuada!";

    }
</script
