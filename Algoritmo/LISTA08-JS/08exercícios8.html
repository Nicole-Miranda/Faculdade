<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label>Escolha um número</label>
    <input type="text" id="ipt_numero">
    <br><br>
    <label>Escreva uma frase</label>
    <input type="text" id="ipt_frase">
    <br><br>
    <button onclick="papagaio()">Papagaio</button>
    <div id="resultado"></div>
</body>
<script>
    function papagaio(){
        let numero = Number(ipt_numero.value)
        let frase = ipt_frase.value
        let contador = 0
        
        while(contador < numero ){
            alert(frase.value)
            contador ++
        }
    }
</script>
</html>
