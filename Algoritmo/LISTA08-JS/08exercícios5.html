<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="numero()">Números cabalísticos</button>
    <div id="resultado"></div>
</body>
<script>
    function numero(){
        resultado.innerHTML=""
        let contador = 1
        const cabalísticos = [3,4,7,10,12]
        
        while(contador <= 30){
            if(!cabalísticos.includes(contador))
            resultado.innerHTML+=`${contador}<br>`
         contador ++
        }
    }
</script>
</html>
