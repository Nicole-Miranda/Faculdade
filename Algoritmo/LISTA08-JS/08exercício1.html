<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="Contar()">Vamos Contar!!</button>
    <div id="resultado"></div>
</body>
<script>
    function Contar(){
       
        resultado.innerHTML=""

        let contador = 0;

        while(contador <=15){
            resultado.innerHTML+=`${contador}<br>`

            contador ++
        }

    }
</script>
</html>
