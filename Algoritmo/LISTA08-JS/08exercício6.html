<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label>Escolha um número entre 20 e 100</label>
    <input type="text" id="ipt_numero">
    <br><br>
    <button onclick="adoro()">Adoro múltiplos de 5</button>
    <div id="resultado"></div>
</body>
<script>
    function adoro(){
        resultado.innerHTML=""
        let contador = 0
        let numero = Number(ipt_numero.value)

        if(numero >= 20 && numero <= 100 ){
            while(contador <= numero){
            if(contador % 5 == 0)
                resultado.innerHTML+=`${contador}<br>`
                contador ++
            }
        }
    }
</script>
</html>
