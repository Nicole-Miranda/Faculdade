<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="exibir()">S2Pares</button>
    <div id="resultado"></div>
</body>
<script>
    function exibir(){
    for(let i = 0; i<=100; i++){
      if(i % 2 == 0)  {
        resultado.innerHTML+=`${i}<br>`
      }
    }
    }
</script>
</html>
