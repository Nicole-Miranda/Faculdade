<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="ipt_sala">
    <button onclick="exibir()">Exibir Resumo</button>

    <div id="resultado"></div>
</body>
<script>
    function exibir(){
        let sala = ipt_sala.value;
        //Formato de digitação: 1ADS 20252, 1CCOA 20261

        let contemCco = sala.includes("CCO");
        let indiceCco = sala.indexOf("CCO");
        let teste = sala.substring(2,5)
        let curso = sala.substring(1,4)
        let turma = sala.substring(4,5)
        let inicio = sala.substring(6,10)
        let semestre = sala.substring(0,1)
        resultado.innerHTML=` 
            contem CCO ${contemCco} <br>
            indice CCO ${indiceCco} <br>
           Você é do curso de: ${curso}, da turma ${turma}, e iniciou em ${inicio}, seu semestre é ${semestre}`;
    }
</script>
</html>
